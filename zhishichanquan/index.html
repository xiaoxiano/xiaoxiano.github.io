            color: #505050;

            margin-right: 20px;
            margin-bottom: 2px;
            font-size: 20px;
            color: #8c8c8c;
        }
        #navBar{
            width: auto;
            height: auto;
            position: fixed;
            right:0;
            bottom: 0;
            background-color: #f0f3f4;
            overflow-y: auto;
            text-align: center;
        }

            width: 100%;
            overflow-x: scroll;
            min-width: 0px;
            margin: 0 10px;
            overflow: visible;
            position: relative;
        }

            overflow-y: scroll;
            padding: 0 5px;
        }
        .nav-thumb{
            position: relative;
            margin: 10px auto;
        }
        .nav-thumb >p{
            text-align: center;
            font-size: 12px;
            margin: 4px 0 0 0;
        }
        .nav-thumb >div{
            position: relative;
            display: inline-block;
            border: 1px solid #c6cfd5;
        }
        .nav-thumb img{
            display: block;
        }
        #main-content{
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #d0cfd8;
            display: flex;
            height: auto;
            flex-flow: row wrap;
            text-align:center;
        }
        #svg-container >svg{
            overflow: visible;
            display: block;
            margin:5px auto;
            margin-bottom: 5px;
        }
        #copyright{
            bottom: 0;
            left: 50%;
            margin: 5px auto;
            font-size: 16px;
            color: #515151;
        }
        #copyright >a{
            text-decoration: none;
            color: #77C;
        }
        .number{
            position: absolute;
            top:0;
            left:0;
            border-top:22px solid #08a1ef;
            border-right: 22px solid transparent;
        }
        .pagenum{
            font-size: 12px;
            color: #fff;
            position: absolute;
            top: -23px;
            left: 2px;
        }
            #navBar::-webkit-scrollbar{
            width: 8px;
            background-color: #f5f5f5;
        }
            #navBar::-webkit-scrollbar-track{
            -webkit-box-shadow: inset 0 0 4px rgba(0,0,0,.3);
            border-radius: 8px;
            background-color: #fff;
        }
            #navBar::-webkit-scrollbar-thumb{
            border-radius: 8px;
            -webkit-box-shadow: inset 0 0 4px rgba(0,0,0,.3);
            background-color: #6b6b70;
        }
        #navBar::-webkit-scrollbar-thumb:hover{
            background-color: #4a4a4f;
        }

        <text class="st1">
            <tspan style="white-space:pre" textLength="117" x="20" y="22.879" class="st2">著作权法控制出租行</tspan>
            <tspan style="white-space:pre" textLength="117" x="20" y="40.021" class="st2">为的主要原因是以租</tspan>
            <tspan style="white-space:pre" textLength="117" x="20" y="57.164" class="st2">代买行为普遍后，著</tspan>
            <tspan style="white-space:pre" textLength="117" x="20" y="74.307" class="st2">作权人的利益可能受</tspan>
            <tspan style="white-space:pre" textLength="117" x="20" y="91.45" class="st2">到实质影响，当然，</tspan>
            <tspan style="white-space:pre" textLength="117" x="20" y="108.593" class="st2">出租很容易导致私人</tspan>
            <tspan style="white-space:pre" textLength="117" x="20" y="125.736" class="st2">复制，从而增加权利</tspan>
            <tspan style="white-space:pre" textLength="104" x="20" y="142.879" class="st2">人打击盗版的难度</tspan>
        </text>
    </g>
    <g id="551" transform="matrix(1,0,0,1,1346.42,4236.29)" ed:height="155.71428571428572" ed:topictype="floating" ed:width="294.88671875" ed:layout="rightmap">
        <path stroke-width="3" fill="#cbe3d1" stroke="#cbe3d1" stroke-linejoin="round" stroke-linecap="round" d="M4,0L290.9,0C293.6,0,294.9,1.3,294.9,4L294.9,151.7C294.9,154.4,293.6,155.7,290.9,155.7L4,155.7C1.3,155.7,0,154.4,0,151.7L0,4C0,1.3,1.3,0,4,0z"/>
        <text class="st3">
            <tspan style="white-space:pre" textLength="130" x="20" y="22.879">实用新型与发明的区别</tspan>
            <tspan style="white-space:pre" textLength="245" x="20" y="40.021">1.使用新型的范围不如发明大，不包括物品</tspan>
            <tspan style="white-space:pre" textLength="78" x="20" y="57.164">的制造方法。</tspan>
            <tspan style="white-space:pre" textLength="193" x="20" y="74.307">2.实用新型的创造性不如发明强。</tspan>
            <tspan style="white-space:pre" textLength="245" x="20" y="91.45">3.实用新型的审批手续比发明简单，无需进</tspan>
            <tspan style="white-space:pre" textLength="78" x="20" y="108.593">行实质审查。</tspan>
            <tspan style="white-space:pre" textLength="235" x="20" y="125.736">4.保护期限不同。发明专利的保护期是20</tspan>
            <tspan style="white-space:pre" textLength="224" x="20" y="142.879">年，而实用新型专利的保护期是10年。</tspan>
        </text>
    </g>

        <text class="st4">
            <tspan style="white-space:pre" textLength="432" x="12" y="19.736">知识产权是指民事主体对创造性智力成果依法享有权利的总称</tspan>
        </text>

    <g id="114" transform="matrix(1,0,0,1,331.85,52.64)" ed:height="58" ed:parentid="102" ed:width="543.79999999999995">

        <text class="st5">
            <tspan style="white-space:pre" textLength="484" x="23" y="16.879">广义的知识产权：是权利人依法就下列客体享有的专有的权利：1作品；2发明、实用</tspan>
            <tspan style="white-space:pre" textLength="482" x="23" y="34.021">新型、外观设计；3商标；4地理标志；5商业秘密；6集成电路布图设计；7植物新品</tspan>
            <tspan style="white-space:pre" textLength="151" x="23" y="51.164">种；8法律规定的其他客体</tspan>
        </text>
    </g>
    <g id="116" transform="matrix(1,0,0,1,331.85,117.14)" ed:height="40.857142857142861" ed:parentid="102" ed:width="531.4571428571428">

        <rect fill="#b3b3ff" height="17.1" x="77.3" y="19.9" width="169.86"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="481" x="17" y="16.879">狭义的知识产权：传统意义上的知识产权，包括著作权、专利权和商标权三个组成部</tspan>
            <tspan style="white-space:pre" textLength="65" x="17" y="34.021">分，其中的</tspan>
            <tspan style="white-space:pre" textLength="169" x="83.529" class="st6">专利权和商标权合成工业产权</tspan>
            <tspan style="white-space:pre" textLength="195" x="253.529">，在我国知识产权属于民事权利。</tspan>
        </text>
    </g>

            <tspan style="white-space:pre" textLength="247" x="11" y="16.879">（知识产权属于绝对权，对世权和支配权）</tspan>

    <g id="131" transform="matrix(1,0,0,1,487.74,194.71)" ed:height="58" ed:parentid="123" ed:width="374.42890624999995">

        <text class="st5">
            <tspan style="white-space:pre" textLength="312" x="23" y="16.879">是指一项知识产权只在其发生的特定国家或地区的领域</tspan>
            <tspan style="white-space:pre" textLength="312" x="23" y="34.021">内，有效不具有域外效力，其他国家没有必须给予保护</tspan>
            <tspan style="white-space:pre" textLength="39" x="23" y="51.164">的义务</tspan>
        </text>

        <text class="st5">
            <tspan style="white-space:pre" textLength="351" x="23" y="16.879">意味着依法产生的知识产权一般只在法律规定的期限内有效超</tspan>
            <tspan style="white-space:pre" textLength="351" x="23" y="34.021">出知识产权的法定保护期间，该知识产权消灭，有关智力成果</tspan>
            <tspan style="white-space:pre" textLength="195" x="23" y="51.164">进入公有空间，人们可以自由使用</tspan>

        <text class="st9">
            <tspan style="white-space:pre" textLength="234" x="23" y="16.879">商业秘密，即属于广义的知识产权范畴。</tspan>

            <tspan style="white-space:pre" textLength="151" x="17" y="34.021">《反不正当竞争法》第9条</tspan>
        </text>
    </g>
    <g id="155" transform="matrix(1,0,0,1,746.31,554.21)" ed:height="23.714285714285715" ed:parentid="153" ed:width="233.97142857142859">

        <text class="st5">
            <tspan style="white-space:pre" textLength="208" x="11" y="16.879">采取不正当手段获取商业秘密的行为</tspan>

    </g>
    <g id="157" transform="matrix(1,0,0,1,746.31,584.43)" ed:height="75.142857142857139" ed:parentid="153" ed:width="288.61746651785711">

            <tspan style="white-space:pre" textLength="221" x="29" y="51.164">者允许他人使用以第一种手段非法获取</tspan>

        <text class="st5">
            <tspan style="white-space:pre" textLength="247" x="23" y="16.879">违反保密义务或者违反权利人有关保守商业</tspan>

        <text class="st5">
            <tspan style="white-space:pre" textLength="442" x="24" y="16.879">是指通过受让、继承、受赠或者法律规定的其他方式，对作品享有著作权的人</tspan>
            <tspan style="white-space:pre" textLength="208" x="24" y="34.593">此种方式取得著作权的，著作权中的</tspan>
            <tspan style="white-space:pre" textLength="273" x="234.111" class="st13">发表权、署名权、修改权和保护作品完整权不发</tspan>

        </text>
    </g>

    <g id="216" transform="matrix(1,0,0,1,752.86,1292.21)" ed:height="58" ed:parentid="214" ed:width="543.79999999999995">

        <text class="st5">
            <tspan style="white-space:pre" textLength="351" x="23" y="16.879">所谓创作，是指直接产生文学、艺术和科学作品的智力活动。</tspan>
            <tspan style="white-space:pre" textLength="481" x="23" y="34.021">为他人创作进行组织工作，提供咨询，意见，物质条件或者进行其他辅助工作，均不</tspan>
            <tspan style="white-space:pre" textLength="52" x="23" y="51.164">视为创作</tspan>
        </text>
    </g>

        <text class="st5">

        <text class="st5">
            <tspan style="white-space:pre" textLength="325" x="17" y="17.45">著作权的客体，即作品是指文学，艺术和科学领域内具有</tspan>

        </text>
    </g>

        <text class="st5">
            <tspan style="white-space:pre" textLength="182" x="59" y="16.879">单位作品特殊职务作品的保护期</tspan>
            <tspan style="white-space:pre" textLength="489" x="59" y="34.021">法人或者非法人组织的作品、著作权(署名权除外)由法人或者非法人组织享有的职务作</tspan>
            <tspan style="white-space:pre" textLength="250" x="59" y="51.736">品，其发表权的保护期为50年，截止于作品</tspan>
            <tspan style="white-space:pre" textLength="165" x="310.154" class="st25">创作完成后第50年12月31日</tspan>
            <tspan style="white-space:pre" textLength="13" x="477.154">，</tspan>
            <tspan style="white-space:pre" textLength="52" x="490.154" class="st19">著作财产</tspan>
            <tspan style="white-space:pre" textLength="107" x="59" y="69.45" class="st19">权的保护期为50年</tspan>
            <tspan style="white-space:pre" textLength="78" x="166.154">，截止于作品</tspan>
            <tspan style="white-space:pre" textLength="178" x="245.154" class="st25">首次发表的第50年的12月31日</tspan>
            <tspan style="white-space:pre" textLength="117" x="424.154">，但作品自创作完成</tspan>
            <tspan style="white-space:pre" textLength="237" x="59" y="86.593">后50年内未发表的，著作权法不再保护。</tspan>
        </text>
    </g>

        <text class="st5">
            <tspan style="white-space:pre" textLength="429" x="17" y="16.879">专利权的主体是专利权人，既享有《专利法》规定的权利并同时承担义务的</tspan>
            <tspan style="white-space:pre" textLength="429" x="17" y="34.021">人。我国自然人和单位都可以依照法定程序申请专利，成为专利权的主体。</tspan>
        </text>
    </g>
    <g id="567" transform="matrix(1,0,0,1,473.9,3921.04)" ed:height="23.714285714285715" ed:parentid="495" ed:width="115.68571428571428">

        <text class="st5">
            <tspan style="white-space:pre" textLength="91" x="11" y="16.879">专利权取得方式</tspan>

    <g id="571" transform="matrix(1,0,0,1,610.98,3936.14)" ed:height="23.714285714285715" ed:parentid="567" ed:width="76.257142857142867">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L64.4,0C70.9,0,76.3,5.3,76.3,11.9C76.3,18.4,70.9,23.7,64.4,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="52" x="11" y="16.879">继受取得</tspan>

    <g id="573" transform="matrix(1,0,0,1,571.55,3966.36)" ed:height="41.428571428571431" ed:parentid="554" ed:width="531.86857142857139">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M20.7,0L511.2,0C522.6,0,531.9,9.3,531.9,20.7C531.9,32.2,522.6,41.4,511.2,41.4L20.7,41.4C9.3,41.4,0,32.2,0,20.7C0,9.3,9.3,0,20.7,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="78" x="17" y="17.45">一般情况下，</tspan>
            <tspan style="white-space:pre" textLength="91" x="96.734" class="st19">申请专利的权利</tspan>
            <tspan style="white-space:pre" textLength="26" x="188.734">属于</tspan>
            <tspan style="white-space:pre" textLength="39" x="214.734" class="st32">发明人</tspan>
            <tspan style="white-space:pre" textLength="26" x="253.734">或者</tspan>
            <tspan style="white-space:pre" textLength="39" x="280.734" class="st32">设计人</tspan>
            <tspan style="white-space:pre" textLength="13" x="319.734" class="st14">，</tspan>
            <tspan style="white-space:pre" textLength="169" x="332.734">申请被批准后，该发明人或者</tspan>
            <tspan style="white-space:pre" textLength="117" x="17" y="34.593">设计人为专利权人。</tspan>
        </text>
    </g>
    <g id="575" transform="matrix(1,0,0,1,571.55,4014.29)" ed:height="26" ed:parentid="554" ed:width="428.47428571428571">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M13,0L415.5,0C422.7,0,428.5,5.8,428.5,13C428.5,20.2,422.7,26,415.5,26L13,26C5.8,26,0,20.2,0,13C0,5.8,5.8,0,13,0z"/>
        <g transform="translate(10.88,3.1)">
            <use transform="translate(0,0)" xlink:href="#imgAttention"/>
        </g>
        <text class="st5">
            <tspan style="white-space:pre" textLength="377" x="34" y="18.021">发明人、设计人只能是自然人；自然人、单位等都可以是专利权人</tspan>
        </text>
    </g>
    <g id="578" transform="matrix(1,0,0,1,571.55,4046.79)" ed:height="40.857142857142861" ed:parentid="554" ed:width="531.4571428571428">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M20.4,0L511,0C522.3,0,531.5,9.1,531.5,20.4C531.5,31.7,522.3,40.9,511,40.9L20.4,40.9C9.1,40.9,0,31.7,0,20.4C0,9.1,9.1,0,20.4,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="481" x="17" y="16.879">先申请原则：两个以上的申请人分别就同样的发明创造申请专利的，专利权授予最先</tspan>
            <tspan style="white-space:pre" textLength="65" x="17" y="34.021">申请的人。</tspan>
        </text>
    </g>
    <g id="580" transform="matrix(1,0,0,1,598.41,4094.14)" ed:height="24.285714285714285" ed:parentid="556" ed:width="497.81142857142856">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M12.1,0L485.7,0C492.4,0,497.8,5.4,497.8,12.1C497.8,18.8,492.4,24.3,485.7,24.3L12.1,24.3C5.4,24.3,0,18.8,0,12.1C0,5.4,5.4,0,12.1,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="26" x="11" y="17.45">是指</tspan>
            <tspan style="white-space:pre" textLength="104" x="37.563" class="st33">执行本单位的任务</tspan>
            <tspan style="white-space:pre" textLength="156" x="142.563">，或者主要是利用本单位的</tspan>
            <tspan style="white-space:pre" textLength="78" x="300.563" class="st33">物质技术条件</tspan>
            <tspan style="white-space:pre" textLength="104" x="379.563">所完成的发明创造</tspan>
        </text>
    </g>
    <g id="582" transform="matrix(1,0,0,1,598.41,4124.93)" ed:height="23.714285714285715" ed:parentid="556" ed:width="483.68571428571431">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L471.8,0C478.4,0,483.7,5.3,483.7,11.9C483.7,18.4,478.4,23.7,471.8,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="455" x="11" y="16.879">职务发明创造申请专利的权利属于该单位。申请被批准后，该单位为专利权人。</tspan>
        </text>
    </g>
    <g id="584" transform="matrix(1,0,0,1,598.41,4155.14)" ed:height="23.714285714285715" ed:parentid="556" ed:width="343.68571428571431">

        <text class="st5">
            <tspan style="white-space:pre" textLength="316" x="11" y="16.879">发明人(设计人)的权利：1.署名权；2.获得奖励及报酬权</tspan>
        </text>
    </g>
    <g id="588" transform="matrix(1,0,0,1,598.41,4185.36)" ed:height="23.714285714285715" ed:parentid="560" ed:width="286.5428571428572">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L274.7,0C281.2,0,286.5,5.3,286.5,11.9C286.5,18.4,281.2,23.7,274.7,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="260" x="11" y="16.879">专利申请权及专利权归属，有约定的，从约定</tspan>
        </text>
    </g>
    <g id="590" transform="matrix(1,0,0,1,598.41,4215.57)" ed:height="41.428571428571431" ed:parentid="560" ed:width="531.86857142857139">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M20.7,0L511.2,0C522.6,0,531.9,9.3,531.9,20.7C531.9,32.2,522.6,41.4,511.2,41.4L20.7,41.4C9.3,41.4,0,32.2,0,20.7C0,9.3,9.3,0,20.7,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="221" x="17" y="17.45">无约定的，专利申请权、专利权均属于</tspan>
            <tspan style="white-space:pre" textLength="114" x="240.734" class="st33">研究开发人(受托人)</tspan>
            <tspan style="white-space:pre" textLength="143" x="356.734">，委托人可以依法实施该</tspan>
            <tspan style="white-space:pre" textLength="26" x="17" y="34.593">专利</tspan>
        </text>
    </g>
    <g id="593" transform="matrix(1,0,0,1,598.41,4263.5)" ed:height="23.714285714285715" ed:parentid="562" ed:width="128.82857142857142">

        <text class="st5">
            <tspan style="white-space:pre" textLength="104" x="11" y="16.879">有约定的，从约定</tspan>
        </text>
    </g>
    <g id="596" transform="matrix(1,0,0,1,598.41,4354.21)" ed:height="23.714285714285715" ed:parentid="562" ed:width="181.39999999999998">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L169.5,0C176.1,0,181.4,5.3,181.4,11.9C181.4,18.4,176.1,23.7,169.5,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="156" x="11" y="16.879">无约定的分为以下三种情况</tspan>
        </text>
    </g>
    <g id="598" transform="matrix(1,0,0,1,801.21,4293.71)" ed:height="40.857142857142861" ed:parentid="596" ed:width="531.4571428571428">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M20.4,0L511,0C522.3,0,531.5,9.1,531.5,20.4C531.5,31.7,522.3,40.9,511,40.9L20.4,40.9C9.1,40.9,0,31.7,0,20.4C0,9.1,9.1,0,20.4,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="481" x="17" y="16.879">专利申请权属于合作方共有，当事人一方转让其共有的专利申请权的，其他各方享有</tspan>
            <tspan style="white-space:pre" textLength="13" x="17" y="34.021">以</tspan>
            <tspan style="white-space:pre" textLength="104" x="30.529" class="st19">同等条件优先受让</tspan>
            <tspan style="white-space:pre" textLength="39" x="135.529">的权利</tspan>
        </text>
    </g>
    <g id="600" transform="matrix(1,0,0,1,801.21,4341.07)" ed:height="58.571428571428569" ed:parentid="596" ed:width="544.21142857142854">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M29.3,0L514.9,0C531.1,0,544.2,13.1,544.2,29.3C544.2,45.5,531.1,58.6,514.9,58.6L29.3,58.6C13.1,58.6,0,45.5,0,29.3C0,13.1,13.1,0,29.3,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="481" x="23" y="16.879">合作开发的当事人一方声明放弃其共有的专利申请权的，可以由另一方单独申请或者</tspan>
            <tspan style="white-space:pre" textLength="130" x="23" y="34.021">由其他各方共同申请。</tspan>
            <tspan style="white-space:pre" textLength="286" x="23" y="51.736">申请人取得专利权的，放弃专利申请权的一方可以</tspan>
            <tspan style="white-space:pre" textLength="26" x="312.906" class="st14">免费</tspan>
            <tspan style="white-space:pre" textLength="78" x="338.906">实施该专利。</tspan>
        </text>
    </g>
    <g id="602" transform="matrix(1,0,0,1,801.21,4406.14)" ed:height="23.714285714285715" ed:parentid="596" ed:width="483.68571428571431">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L471.8,0C478.4,0,483.7,5.3,483.7,11.9C483.7,18.4,478.4,23.7,471.8,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="455" x="11" y="16.879">合作开发的当事人一方不同意申请专利的，另一方或者其他各方不得申请专利。</tspan>
        </text>
    </g>
    <g id="604" transform="matrix(1,0,0,1,473.9,4539.04)" ed:height="23.714285714285715" ed:parentid="497" ed:width="115.68571428571428">

        <text class="st5">
            <tspan style="white-space:pre" textLength="91" x="11" y="16.879">专利权人的权利</tspan>
        </text>
    </g>
    <g id="606" transform="matrix(1,0,0,1,473.9,4671.93)" ed:height="23.714285714285715" ed:parentid="497" ed:width="115.68571428571428">

        <text class="st5">
            <tspan style="white-space:pre" textLength="91" x="11" y="16.879">专利权人的义务</tspan>
        </text>
    </g>
    <g id="608" transform="matrix(1,0,0,1,610.98,4436.36)" ed:height="23.714285714285715" ed:parentid="604" ed:width="141.97142857142856">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L130.1,0C136.7,0,142,5.3,142,11.9C142,18.4,136.7,23.7,130.1,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="117" x="11" y="16.879">自己实施专利的权利</tspan>
        </text>
    </g>
    <g id="610" transform="matrix(1,0,0,1,610.98,4466.57)" ed:height="24.285714285714285" ed:parentid="604" ed:width="168.66857142857143">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M12.1,0L156.5,0C163.2,0,168.7,5.4,168.7,12.1C168.7,18.8,163.2,24.3,156.5,24.3L12.1,24.3C5.4,24.3,0,18.8,0,12.1C0,5.4,5.4,0,12.1,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="26" x="11" y="17.45" class="st14">许可</tspan>
            <tspan style="white-space:pre" textLength="117" x="37.563">他人实施专利的权利</tspan>
        </text>
    </g>
    <g id="612" transform="matrix(1,0,0,1,610.98,4524.21)" ed:height="23.714285714285715" ed:parentid="604" ed:width="299.68571428571431">
        <path fill="none" stroke="#e3e3e3" stroke-linejoin="round" stroke-linecap="round" d="M11.9,0L287.8,0C294.4,0,299.7,5.3,299.7,11.9C299.7,18.4,294.4,23.7,287.8,23.7L11.9,23.7C5.3,23.7,0,18.4,0,11.9C0,5.3,5.3,0,11.9,0z"/>
        <text class="st5">
            <tspan style="white-space:pre" textLength="273" x="11" y="16.879">转让权：专利权人有权转让专利权和专利申请权</tspan>
        </text>
    </g>
    <g id="614" transform="matrix(1,0,0,1,932.07,4497.36)" ed:height="77.428571428571431" ed:parentid="612" ed:width="381.58739955357146">

        <text class="st5">
            <tspan style="white-space:pre" textLength="260" x="30" y="17.45">转让专利申请权或者专利权的当事人应当订立</tspan>
            <tspan style="white-space:pre" textLength="39" x="293.694" class="st34">书面合</tspan>
            <tspan style="white-space:pre" textLength="13" x="30" y="35.164" class="st34">同</tspan>
            <tspan style="white-space:pre" textLength="299" x="43.694">，并向国务院专利行政部门登记，由国务院专利行政</tspan>
            <tspan style="white-space:pre" textLength="52" x="30" y="52.879">部门予以</tspan>
            <tspan style="white-space:pre" textLength="26" x="82.694" class="st34">公告</tspan>
            <tspan style="white-space:pre" textLength="195" x="109.694">，专利申请权或者专利权的转让自</tspan>
            <tspan style="white-space:pre" textLength="39" x="306.694" class="st34">登记之</tspan>
            <tspan style="white-space:pre" textLength="52" x="30" y="70.593" class="st34">日起生效</tspan>
            <tspan style="white-space:pre" textLength="13" x="82.694">。</tspan>
        </text>

        <text class="st5">
            <tspan style="white-space:pre" textLength="403" x="30" y="17.45">任何能够将自然人、法人或者非法人组织的商品与他人的商品区别开的</tspan>
            <tspan style="white-space:pre" textLength="26" x="437.077" class="st39">标志</tspan>
            <tspan style="white-space:pre" textLength="52" x="464.077">，包括文</tspan>
            <tspan style="white-space:pre" textLength="260" x="30" y="34.593">字，图形字母，数字，三维标志，颜色组合和</tspan>
            <tspan style="white-space:pre" textLength="26" x="293.077" class="st40">声音</tspan>
            <tspan style="white-space:pre" textLength="195" x="319.077">等，以及上述要素的组合均可以作</tspan>

            <tspan style="white-space:pre" textLength="286" x="30" y="68.879">商标注册人有权标明“注册商标”或者注册标记。</tspan>

        <text class="st5">

            <tspan style="white-space:pre" textLength="39" x="260.317" class="st13">越密切</tspan>
            <tspan style="white-space:pre" textLength="13" x="300.317" class="st13">，</tspan>

            <tspan style="white-space:pre" textLength="13" x="379.317" class="st13">，</tspan>
            <tspan style="white-space:pre" textLength="117" x="24" y="52.879" class="st13">反之，显著性越强。</tspan>
        </text>
    </g>
